<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Web Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <!-- <nav>
        <div id="spotify-logo"><img src="spotify.png" alt="" /></div>
        
      </nav> -->
      <div id="navbar">
        <img src="spotify-green.png" alt="" />
        <div class="search-bar">
          <img src="home.png" alt="">
          <div id="search">
            <i class="ri-search-line"></i>
            <input type="text" placeholder="What do you want to play ?">
            
            <span>|</span>
            <i class="ri-folder-5-line"></i>
          </div>
        </div>
        <div class="nav-right">
          <button class="explore-premium">Explore Premium</button>
          <div class="install-app">
            <i class="ri-download-line"></i>Install App
          </div>
          <div class="icons">
            <i class="ri-notification-2-fill"></i>
            <i class="ri-team-line"></i>
          </div>
          <div class="user-profile">H</div>
        </div>
      </div>
      <div id="left-sidebar">
        <div class="sup">
          <div class="head">
            <h3>Your Library</h3>
          </div>
        </div>
        <div class="sdown"></div>
      </div>
      <div id="main-content"></div>
      <div id="right-sidebar"></div>
      <div id="player"></div>
    </div>
  </body>
</html>
